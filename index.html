<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#003399">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Doorstep">
<meta name="description" content="Request a doorstep at the Council of the EU">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Doorstep Request · Council of the EU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --eu-blue: #003399;
    --eu-blue-mid: #0a3fa8;
    --eu-blue-light: #1a52c4;
    --eu-blue-pale: #d6e0f5;
    --eu-gold: #FFCC00;
    --eu-gold-dark: #c9a000;
    --white: #ffffff;
    --off-white: #f4f6fb;
    --surface: #eaedfa;
    --muted: #7a87a8;
    --text: #0d1b3e;
    --border: rgba(0,51,153,0.1);
    --radius: 14px;
    --radius-sm: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--eu-blue);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overscroll-behavior: none;
  }

  body { display: flex; flex-direction: column; min-height: 100dvh; }

  /* HEADER */
  .header {
    background: var(--eu-blue);
    padding: calc(var(--safe-top) + 14px) 20px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-shrink: 0;
  }

  .header-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .eu-flag-logo {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    border-radius: 6px;
    overflow: hidden;
  }

  .header-text h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    line-height: 1.2;
  }

  .header-text p {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    margin-top: 1px;
    font-weight: 300;
  }

  /* DAY PICKER */
  .day-picker {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 14px;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .day-picker::-webkit-scrollbar { display: none; }

  .day-chip {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 14px;
    border-radius: 12px;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.07);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    min-width: 58px;
  }

  .day-chip.active {
    background: var(--eu-gold);
    border-color: var(--eu-gold);
  }

  .day-chip .chip-dow {
    font-size: 10px;
    font-weight: 500;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .day-chip.active .chip-dow { color: var(--eu-blue); }

  .day-chip .chip-num {
    font-size: 18px;
    font-weight: 600;
    color: var(--white);
    line-height: 1.2;
  }

  .day-chip.active .chip-num { color: var(--eu-blue); }

  .day-chip .chip-mon {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
  }

  .day-chip.active .chip-mon { color: var(--eu-blue); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--eu-blue);
    padding: 0 20px 16px;
    gap: 6px;
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 8px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.07);
  }

  .tab.active { background: var(--eu-gold); color: var(--eu-blue); }

  /* SCROLL CONTENT */
  .content {
    background: var(--off-white);
    border-radius: 24px 24px 0 0;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px 20px calc(var(--safe-bottom) + 100px);
  }

  .page { display: none; }
  .page.active { display: block; }

  /* FORM SECTIONS */
  .section { margin-bottom: 24px; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  .field-card {
    background: var(--white);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    overflow: hidden;
  }

  .field-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--border);
    gap: 12px;
  }

  .field-row:last-child { border-bottom: none; }

  .field-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .field-icon.blue { background: var(--eu-blue-pale); }
  .field-icon.gold { background: #fff8cc; }

  .field-label {
    font-size: 13px;
    color: var(--muted);
    min-width: 70px;
    flex-shrink: 0;
  }

  .field-input, .field-select {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    background: transparent;
    text-align: right;
    -webkit-appearance: none;
    appearance: none;
  }

  .field-select { cursor: pointer; }

  /* TIME SLOTS */
  .slots-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .slot-btn {
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 4px 7px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  .slot-btn:active { transform: scale(0.95); }

  .slot-btn.selected {
    background: var(--eu-blue);
    color: var(--white);
    border-color: var(--eu-blue);
  }

  .slot-btn.yours {
    background: var(--eu-gold);
    color: var(--eu-blue);
    border-color: var(--eu-gold-dark);
    font-weight: 600;
  }

  .slot-count {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    font-weight: 500;
    color: var(--muted);
    margin-top: 2px;
  }

  .slot-btn.selected .slot-count { color: rgba(255,255,255,0.7); }
  .slot-btn.yours .slot-count { color: var(--eu-blue); opacity: 0.7; }

  /* PRESS FORMAT */
  .press-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .press-opt {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 8px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .press-opt:active { transform: scale(0.97); }

  .press-opt.selected {
    border-color: var(--eu-blue);
    background: var(--eu-blue-pale);
  }

  .press-opt .press-icon { font-size: 26px; margin-bottom: 8px; display: block; }
  .press-opt .press-name { font-size: 11px; font-weight: 600; color: var(--text); display: block; line-height: 1.3; }
  .press-opt .press-sub { font-size: 10px; color: var(--muted); margin-top: 3px; display: block; line-height: 1.3; }
  .press-opt.selected .press-name { color: var(--eu-blue); }

  /* NOTES */
  .notes-field {
    background: var(--white);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 80px;
  }

  .notes-field::placeholder { color: var(--muted); }

  /* SUBMIT */
  .submit-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 20px calc(var(--safe-bottom) + 16px);
    background: linear-gradient(to top, var(--off-white) 70%, transparent);
    z-index: 50;
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--eu-blue);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .submit-btn:active { transform: scale(0.98); }
  .submit-btn.success { background: #1a7d4a; }

  /* OVERVIEW */
  .overview-date-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--eu-blue);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 10px 2px;
  }

  .day-summary {
    background: var(--white);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .day-summary-header {
    background: var(--eu-blue);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .day-summary-header span { font-size: 13px; font-weight: 500; color: var(--white); }

  .day-count {
    background: var(--eu-gold);
    color: var(--eu-blue);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
  }

  .request-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .request-row:last-child { border-bottom: none; }

  .req-time { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--eu-blue); min-width: 42px; }
  .req-flag { font-size: 20px; }
  .req-info { flex: 1; }
  .req-name { font-size: 13px; font-weight: 500; color: var(--text); display: block; }
  .req-press-label { font-size: 11px; color: var(--muted); }

  .req-badge { font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .badge-national { background: var(--eu-blue-pale); color: var(--eu-blue); }
  .badge-international { background: #e3f5e8; color: #1a5c35; }
  .badge-statement { background: #fff8cc; color: #7a6000; }

  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 40px; display: block; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed;
    top: calc(var(--safe-top) + 110px);
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--eu-blue);
    color: var(--white);
    padding: 12px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .legend { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <!-- Real EU Flag SVG -->
    <div class="eu-flag-logo">
      <svg viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg" width="42" height="42">
        <rect width="42" height="42" fill="#003399"/>
        <g fill="#FFCC00">
          <!-- 12 stars arranged in a circle, radius ~13, center 21,21 -->
          <!-- Star helper: each star is a tiny 5-point star -->
          <!-- Top -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="translate(0,0)"/>
          <!-- Top-right 1 -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(30, 21, 21)"/>
          <!-- Top-right 2 -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(60, 21, 21)"/>
          <!-- Right -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(90, 21, 21)"/>
          <!-- Bottom-right 1 -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(120, 21, 21)"/>
          <!-- Bottom-right 2 -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(150, 21, 21)"/>
          <!-- Bottom -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(180, 21, 21)"/>
          <!-- Bottom-left 1 -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(210, 21, 21)"/>
          <!-- Bottom-left 2 -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(240, 21, 21)"/>
          <!-- Left -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(270, 21, 21)"/>
          <!-- Top-left 1 -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(300, 21, 21)"/>
          <!-- Top-left 2 -->
          <polygon points="21,5 21.9,7.7 24.8,7.7 22.5,9.4 23.4,12.1 21,10.4 18.6,12.1 19.5,9.4 17.2,7.7 20.1,7.7" transform="rotate(330, 21, 21)"/>
        </g>
      </svg>
    </div>
    <div class="header-text">
      <h1>Doorstep Request</h1>
      <p>Council of the European Union</p>
    </div>
  </div>

  <!-- DAY PICKER -->
  <div class="day-picker" id="day-picker"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('request', this)">New request</button>
  <button class="tab" onclick="showTab('overview', this)">Overview</button>
</div>

<div class="content">

  <!-- REQUEST PAGE -->
  <div class="page active" id="page-request">

    <div class="section">
      <div class="section-label">Your details</div>
      <div class="field-card">
        <div class="field-row">
          <div class="field-icon blue">👤</div>
          <span class="field-label">Name</span>
          <input class="field-input" id="input-name" type="text" placeholder="Speaker's name" autocomplete="name">
        </div>
        <div class="field-row">
          <div class="field-icon blue">🌍</div>
          <span class="field-label">Country</span>
          <select class="field-select" id="input-country">
            <option value="">Select…</option>
            <option value="AT">🇦🇹 Austria</option>
            <option value="BE">🇧🇪 Belgium</option>
            <option value="BG">🇧🇬 Bulgaria</option>
            <option value="HR">🇭🇷 Croatia</option>
            <option value="CY">🇨🇾 Cyprus</option>
            <option value="CZ">🇨🇿 Czech Republic</option>
            <option value="DK">🇩🇰 Denmark</option>
            <option value="EE">🇪🇪 Estonia</option>
            <option value="FI">🇫🇮 Finland</option>
            <option value="FR">🇫🇷 France</option>
            <option value="DE">🇩🇪 Germany</option>
            <option value="GR">🇬🇷 Greece</option>
            <option value="HU">🇭🇺 Hungary</option>
            <option value="IE">🇮🇪 Ireland</option>
            <option value="IT">🇮🇹 Italy</option>
            <option value="LV">🇱🇻 Latvia</option>
            <option value="LT">🇱🇹 Lithuania</option>
            <option value="LU">🇱🇺 Luxembourg</option>
            <option value="MT">🇲🇹 Malta</option>
            <option value="NL">🇳🇱 Netherlands</option>
            <option value="PL">🇵🇱 Poland</option>
            <option value="PT">🇵🇹 Portugal</option>
            <option value="RO">🇷🇴 Romania</option>
            <option value="SK">🇸🇰 Slovakia</option>

    </div>

    <div class="section">
      <div class="section-label">Preferred time slot</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--eu-blue)"></div> Selected</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--eu-gold)"></div> Your booking</div>
        <div class="legend-item" style="font-size:10px; color:var(--muted);">Multiple bookings per slot allowed</div>
      </div>
      <div class="slots-grid" id="slots-grid"></div>
    </div>

    <div class="section">
      <div class="section-label">Press format</div>
      <div class="press-options">
        <div class="press-opt selected" data-press="national" onclick="selectPress(this)">
          <span class="press-icon">🏴</span>
          <span class="press-name">National press</span>
          <span class="press-sub">Home country media</span>
        </div>
        <div class="press-opt" data-press="international" onclick="selectPress(this)">
          <span class="press-icon">🌐</span>
          <span class="press-name">International</span>
          <span class="press-sub">All accredited media</span>
        </div>
        <div class="press-opt" data-press="statement" onclick="selectPress(this)">
          <span class="press-icon">📄</span>

      <div class="section-label">Notes (optional)</div>
      <textarea class="notes-field" id="input-notes" placeholder="Travelling with interpreter, specific location request…" rows="3"></textarea>

  </div>

  <!-- OVERVIEW PAGE -->
  <div class="page" id="page-overview">
    <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
      <button onclick="exportToText()" style="display:flex;align-items:center;gap:7px;background:var(--eu-blue);color:var(--white);border:none;border-radius:var(--radius-sm);padding:9px 16px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;">
        &#11015; Export as text
      </button>
    </div>
    <div id="overview-container"></div>
  </div>

</div>

<div class="submit-bar" id="submit-bar">
  <button class="submit-btn" id="submit-btn" onclick="submitRequest()">Submit doorstep request</button>
</div>

<div class="toast" id="toast"></div>

<script>
const SLOTS = ['08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];

const DAYS_OF_WEEK = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let selectedSlot = null;
let selectedPress = 'national';
let selectedDayIndex = 0;

// Generate 5 days starting today
function getDays() {
  const days = [];
  const today = new Date();
  for (let i = 0; i < 5; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    days.push(d);
  }
  return days;
}

const days = getDays();

// Requests keyed by dateString (YYYY-MM-DD)
function dateKey(d) {
  return d.toISOString().slice(0, 10);
}

// Pre-populated sample requests
const allRequests = {};
days.forEach((d, i) => {
  allRequests[dateKey(d)] = [];
});

// Add some sample data to today and tomorrow
const todayKey = dateKey(days[0]);
const tomorrowKey = days[1] ? dateKey(days[1]) : null;

allRequests[todayKey] = [
  { name: 'K. Lindström', flag: '🇸🇪', time: '09:00', press: 'national', ministry: 'AGRI' },
  { name: 'G. Rossi', flag: '🇮🇹', time: '09:00', press: 'international', ministry: 'AGRI' },
  { name: 'A. Müller', flag: '🇩🇪', time: '11:00', press: 'statement', ministry: 'AGRI' },
  { name: 'P. Dubois', flag: '🇫🇷', time: '14:30', press: 'national', ministry: 'AGRI' },
];

if (tomorrowKey) {
  allRequests[tomorrowKey] = [
    { name: 'M. Kowalski', flag: '🇵🇱', time: '10:00', press: 'national', ministry: 'COMPET' },
  ];
}

let mySubmissions = {}; // dateKey -> submission

// BUILD DAY PICKER
function buildDayPicker() {
  const picker = document.getElementById('day-picker');
  picker.innerHTML = '';
  days.forEach((d, i) => {
    const chip = document.createElement('div');
    chip.className = 'day-chip' + (i === selectedDayIndex ? ' active' : '');
    const dow = i === 0 ? 'Today' : i === 1 ? 'Tmrw' : DAYS_OF_WEEK[d.getDay()];
    chip.innerHTML = `<span class="chip-dow">${dow}</span><span class="chip-num">${d.getDate()}</span><span class="chip-mon">${MONTHS[d.getMonth()]}</span>`;
    chip.onclick = () => { selectedDayIndex = i; selectedSlot = null; buildDayPicker(); buildSlots(); updateOverview(); };
    picker.appendChild(chip);
  });
}

// SLOT COUNT for selected day
function slotCount(slot) {
  const key = dateKey(days[selectedDayIndex]);
  const reqs = allRequests[key] || [];
  return reqs.filter(r => r.time === slot).length;
}

function buildSlots() {
  const grid = document.getElementById('slots-grid');
  grid.innerHTML = '';
  const dayKey = dateKey(days[selectedDayIndex]);
  const mine = mySubmissions[dayKey];

  SLOTS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'slot-btn';
    btn.dataset.time = s;
    const count = slotCount(s);
    const isMySlot = mine && mine.time === s;

    if (isMySlot) btn.classList.add('yours');
    else if (s === selectedSlot) btn.classList.add('selected');

    const countLabel = count > 0 ? `${count} booked` : 'available';
    btn.innerHTML = `${s}<span class="slot-count">${countLabel}</span>`;

    btn.onclick = () => {
      if (isMySlot) return;
      selectedSlot = s;
      buildSlots();
    };
    grid.appendChild(btn);
  });
}

function selectPress(el) {
  document.querySelectorAll('.press-opt').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected');
  selectedPress = el.dataset.press;
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('page-' + tab).classList.add('active');
  document.getElementById('submit-bar').style.display = tab === 'request' ? 'block' : 'none';
  if (tab === 'overview') renderOverview();
}

function getFlag(countryVal) {
  const opt = document.querySelector(`#input-country option[value="${countryVal}"]`);
  if (!opt) return '🌍';
  return opt.text.split(' ')[0];
}

function submitRequest() {
  const name = document.getElementById('input-name').value.trim();
  const country = document.getElementById('input-country').value;
  const ministry = document.getElementById('input-ministry').value.trim();
  if (!name) { showToast('Please enter your name'); return; }
  if (!country) { showToast('Please select your country'); return; }
  if (!selectedSlot) { showToast('Please choose a time slot'); return; }

  const dayKey = dateKey(days[selectedDayIndex]);
  const submission = { name, flag: getFlag(country), time: selectedSlot, press: selectedPress, ministry };

  if (!allRequests[dayKey]) allRequests[dayKey] = [];
  allRequests[dayKey].push(submission);
  mySubmissions[dayKey] = submission;

  const btn = document.getElementById('submit-btn');
  btn.textContent = '✓ Request submitted';
  btn.classList.add('success');
  setTimeout(() => { btn.textContent = 'Submit doorstep request'; btn.classList.remove('success'); }, 3000);

  const dayLabel = selectedDayIndex === 0 ? 'today' : selectedDayIndex === 1 ? 'tomorrow' : DAYS_OF_WEEK[days[selectedDayIndex].getDay()];
  showToast(`Booked ${selectedSlot} on ${dayLabel}`);
  buildSlots();
}

function updateOverview() {
  if (document.getElementById('page-overview').classList.contains('active')) renderOverview();
}

function renderOverview() {
  const container = document.getElementById('overview-container');
  const badgeClass = { national: 'badge-national', international: 'badge-international', statement: 'badge-statement' };
  const badgeLabel = { national: 'National', international: 'International', statement: 'Statement' };

  let html = '';
  days.forEach((d, i) => {
    const key = dateKey(d);
    const reqs = (allRequests[key] || []).slice().sort((a, b) => a.time.localeCompare(b.time));
    const dow = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : DAYS_OF_WEEK[d.getDay()];
    const dateStr = `${dow}, ${d.getDate()} ${MONTHS[d.getMonth()]}`;

    if (reqs.length === 0) return;

    html += `<div class="day-summary">
      <div class="day-summary-header">
        <span>${dateStr}</span>
        <span class="day-count">${reqs.length} request${reqs.length !== 1 ? 's' : ''}</span>
      </div>`;

    // Group by time slot for readability
    const byTime = {};
    reqs.forEach(r => { if (!byTime[r.time]) byTime[r.time] = []; byTime[r.time].push(r); });

    Object.keys(byTime).sort().forEach(time => {
      byTime[time].forEach(r => {
        html += `<div class="request-row">
          <span class="req-time">${r.time}</span>
          <span class="req-flag">${r.flag}</span>
          <div class="req-info">
            <span class="req-name">${r.name}</span>
            <span class="req-press-label">${r.ministry || '—'}</span>
          </div>
          <span class="req-badge ${badgeClass[r.press]}">${badgeLabel[r.press]}</span>
        </div>`;
      });
    });

    html += `</div>`;
  });

  if (!html) {
    html = '<div class="empty-state"><span class="empty-icon">📭</span><p>No requests submitted yet</p></div>';
  }

  container.innerHTML = html;
}


function exportToText() {
  const badgeLabel = { national: 'National press', international: 'International press', statement: 'Statement only' };
  let lines = [];
  lines.push('DOORSTEP REQUESTS — COUNCIL OF THE EUROPEAN UNION');
  lines.push('Generated: ' + new Date().toLocaleString('en-GB', { dateStyle: 'full', timeStyle: 'short' }));
  lines.push('');

  let hasData = false;
  days.forEach((d, i) => {
    const key = dateKey(d);
    const reqs = (allRequests[key] || []).slice().sort((a, b) => a.time.localeCompare(b.time));
    if (reqs.length === 0) return;
    hasData = true;
    const dow = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : DAYS_OF_WEEK[d.getDay()];
    lines.push('─────────────────────────────────');
    lines.push(dow.toUpperCase() + ' — ' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear());
    lines.push('─────────────────────────────────');
    reqs.forEach(r => {
      lines.push('  ' + r.time + '  ' + r.flag + ' ' + r.name + ' (' + (r.ministry || '—') + ')');
      lines.push('         Format: ' + badgeLabel[r.press]);
      if (r.notes) lines.push('         Notes: ' + r.notes);
    });
    lines.push('  Total: ' + reqs.length + ' request' + (reqs.length !== 1 ? 's' : ''));
    lines.push('');
  });

  if (!hasData) { showToast('No requests to export'); return; }

  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'doorstep-requests-' + dateKey(days[0]) + '.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported as text file');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

buildDayPicker();
buildSlots();
renderOverview();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
